<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Hub - Game Scripts</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #121214; color: #e1e1e6; }

</head>
<body class="font-sans min-h-screen flex flex-col">

    <nav class="bg-[#1a1a1e] border-b border-[#29292e] py-4 px-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fa-solid fa-terminal text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-wider text-white">VECTOR <span class="text-indigo-500">HUB</span></span>
            </div>
            <div class="flex items-center space-x-4">
                <a href="https://discord.gg/4vaYaUfTCp" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-[#5865F2] transition text-sm flex items-center bg-[#202024] px-3 py-1.5 rounded-lg border border-[#29292e]">
                    <i class="fa-brands fa-discord mr-1.5 text-base"></i> Discord
                </a>
                <a href="https://www.youtube.com/@VectorHub/videos" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-[#FF0000] transition text-sm flex items-center bg-[#202024] px-3 py-1.5 rounded-lg border border-[#29292e]">
                    <i class="fa-brands fa-youtube mr-1.5 text-base"></i> YouTube
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-10">
        
        <div class="text-center mb-12">
            <h1 class="text-3xl font-extrabold text-white mb-2 tracking-wide">ROBLOX SCRIPT HUB</h1>
            <p class="text-gray-400 text-sm">รวมสคริปต์อัพเดทล่าสุด คัดลอกแล้วนำไปใช้งานใน Executor ได้ทันที</p>
        </div>

        <div id="gameGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>

    </main>

    <footer class="bg-[#1a1a1e] border-t border-[#29292e] py-4 text-center text-sm text-gray-500">
        &copy; 2026 Vector Hub. All rights reserved.
    </footer>

    <script>

        const myGamesData = [
            {
                name: "VSPHONE",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSRpgT2ti7wpOuLHc2W_QIkXUGOCfIzJXRMI7ELyh2bRw&s=10",
                code: `https://www.vsphone.com/ref?utm_source=YouTube&utm_medium=kol&utm_campaign=vsagq9b12456rt`
            },
            {
                name: "Drain the lake",
                image: "https://i9.ytimg.com/vi/vej--0tbwRk/mqdefault.jpg?v=6a562dfa&sqp=CITa8tIG&rs=AOn4CLDsEYjsS0nVSE00oVqZY1cgbqz3xA",
                code: `loadstring(game:HttpGet('https://raw.githubusercontent.com/ForJob99999/ProjectNokey/refs/heads/main/Zero'))()`
            },
            {
                name: "Climb WaterSlide and slide",
                image: "https://i9.ytimg.com/vi/_QvFV6O49Wg/mqdefault.jpg?v=6a5694d8&sqp=CITa8tIG&rs=AOn4CLDgPpB_GBcT0oSr2QU0NcLhfArfsw",
                code: `loadstring(game:HttpGet('https://raw.githubusercontent.com/ForJob99999/ProjectNokey/refs/heads/main/One'))()`
            },
            {
                name: "Build A Boat For Treasure",
                image: "https://i9.ytimg.com/vi/jrVRkpGAMYY/mqdefault.jpg?v=6a5683cd&sqp=CITa8tIG&rs=AOn4CLCmQzP4-fCA47Etbai36qsoqUk11w",
                code: `loadstring(game:HttpGet('https://raw.githubusercontent.com/ForJob99999/ProjectNokey/refs/heads/main/TwoThree'))()`
            },
            {
                name: "Merg A Nuke",
                image: "https://i9.ytimg.com/vi/sTyxJYVNki0/mqdefault.jpg?v=6a573a7b&sqp=CITa8tIG&rs=AOn4CLD1TrmLq8ivhtOAdmtyBfF04tof4g",
                code: `loadstring(game:HttpGet('https://raw.githubusercontent.com/ForJob99999/ProjectNokey/refs/heads/main/Four'))()`
            },
            {
                name: "Speed Training",
                image: "https://i9.ytimg.com/vi/c34pWZpLDqk/mqdefault.jpg?v=6a5b56ba&sqp=CITa8tIG&rs=AOn4CLARyO7t684Zc2QZaYLyQHC1z4ZuFA",
                code: `loadstring(game:HttpGet('https://raw.githubusercontent.com/ForJob99999/ProjectNokey/refs/heads/main/Five'))()`
            },
            {
                name: "+1 Mine Per Click",
                image: "https://i9.ytimg.com/vi/_D8n50gFGnw/mqdefault.jpg?v=6a5c80c0&sqp=CITa8tIG&rs=AOn4CLCPtRNAx4LwxnwWEu4NlDApd9kbMQ",
                code: `loadstring(game:HttpGet('https://raw.githubusercontent.com/ForJob99999/ProjectNokey/refs/heads/main/Six'))()`
            },
            {
                name: "Be a Streamer",
                image: "https://i9.ytimg.com/vi/VPqtS9-33uo/mqdefault.jpg?v=6a5b411e&sqp=CLDc8tIG&rs=AOn4CLB2vxGjPGhxid2E3d58nWrtuckJ4w",
                code: `loadstring(game:HttpGet('https://raw.githubusercontent.com/ForJob99999/ProjectNokey/refs/heads/main/Seven'))()`
            },
            {
                name: "Throw a Coin",
                image: "https://i9.ytimg.com/vi/NstOCKqajdQ/mqdefault.jpg?v=6a5c9782&sqp=CITa8tIG&rs=AOn4CLC86DM83arklK9h8pShXsrDTU3z5w",
                code: `loadstring(game:HttpGet('https://raw.githubusercontent.com/ForJob99999/ProjectNokey/refs/heads/main/8'))()`
            },
            {
                name: "Farm Chiken",
                image: "https://i9.ytimg.com/vi/VogE7Bm25IY/mqdefault.jpg?v=6a5cabdd&sqp=CITa8tIG&rs=AOn4CLAqlo7iTYRBg912MrHGoCQ8gnliSQ",
                code: `loadstring(game:HttpGet('https://raw.githubusercontent.com/ForJob99999/ProjectNokey/refs/heads/main/9'))()`
            },
            {
                name: "+1 Magic Evolution",
                image: "https://i9.ytimg.com/vi/UGJqn0rc0Jw/mqdefault.jpg?v=6a5cf510&sqp=CKzr89IG&rs=AOn4CLChIT7dGZ6KsLYxs5soc9blo0klkg",
                code: `loadstring(game:HttpGet('https://raw.githubusercontent.com/ForJob99999/ProjectNokey/refs/heads/main/10'))()`
            }
        ];


        function displayGames() {
            const gameGrid = document.getElementById('gameGrid');
            gameGrid.innerHTML = '';

            myGamesData.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'bg-[#1a1a1e] border border-[#29292e] rounded-xl overflow-hidden shadow-lg flex flex-col';
                
                card.innerHTML = `
                    <div class="h-44 overflow-hidden bg-[#121214]">
                        <img src="${game.image}" alt="${game.name}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=400&q=80'">
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="text-base font-bold text-white mb-2 tracking-wide">${game.name}</h3>
                            <div class="relative bg-[#121214] border border-[#29292e] rounded-lg p-3 mb-4 max-h-24 overflow-y-auto font-mono text-xs text-indigo-400 whitespace-pre-wrap break-all select-all">
                                ${escapeHtml(game.code)}
                            </div>
                        </div>
                        <button onclick="copyScript(this)" data-code="${escapeHtml(game.code)}" class="w-full bg-indigo-600/10 hover:bg-indigo-600 text-indigo-400 hover:text-white font-medium py-2 rounded-lg transition flex items-center justify-center space-x-2 border border-indigo-500/20 hover:border-transparent">
                            <i class="fa-regular fa-copy"></i>
                            <span>คัดลอกโค้ด</span>
                        </button>
                    </div>
                `;
                gameGrid.appendChild(card);
            });
        }

        function copyScript(button) {
            const codeText = button.getAttribute('data-code');
            navigator.clipboard.writeText(codeText).then(() => {
                const originalContent = button.innerHTML;
                button.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> <span class="text-green-400">คัดลอกแล้ว!</span>`;
                button.classList.add('bg-green-500/10', 'border-green-500/20');
                
                setTimeout(() => {
                    button.innerHTML = originalContent;
                    button.classList.remove('bg-green-500/10', 'border-green-500/20');
                }, 1500);
            });
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        displayGames();
    </script>
</body>
</html>
